<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ .Site.BaseURL }}" class="site-title">{{ .Site.Title }}</a>
      <nav class="site-nav">
        <a href="{{ .Site.BaseURL }}">Home</a>
        <a href="{{ "about/" | absURL }}">About</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ now.Year }} {{ .Site.Params.author }}</p>
    </div>
  </footer>
</body>
</html>
